<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasse">
<meta name="theme-color" content="#16313b">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Kassensystem</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #16313b;
    --bg-2: #1c3f4a;
    --orange: #e8772e;
    --orange-dark: #d4651f;
    --red: #d33a2c;
    --purple: #6a5fc4;
    --green: #6fbf3f;
    --green-dark: #5da035;
    --grey: #4a4a4a;
    --essen-btn: #596a72;
    --essen-btn-active: #4a585f;
    --card-bg: #ffffff;
    --text-light: #f2f2f2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text-light);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 10px 12px 6px;
    overflow-x: auto;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 10px; /* larger touch target */
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 700;
    color: white;
    background: var(--grey);
    opacity: 0.6;
    cursor: pointer;
    white-space: nowrap;
    min-width: 70px;
  }
  .tab-btn.active { opacity: 1; box-shadow: 0 0 0 2px rgba(255,255,255,0.5) inset; }
  .tab-bar { background: var(--orange); }
  .tab-bier { background: var(--green); }
  .tab-essen { background: var(--grey); }
  .tab-info { background: var(--purple); }

  /* Pfand toggle row */
  .pfand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px 10px;
    font-size: 15px;
    font-weight: 600;
  }
  .switch {
    position: relative;
    width: 50px;
    height: 30px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background-color: #555;
    border-radius: 30px;
    transition: 0.2s;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 24px; width: 24px;
    left: 3px; bottom: 3px;
    background-color: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  input:checked + .slider { background-color: var(--orange); }
  input:checked + .slider:before { transform: translateX(20px); }

    /* Main area (Mobile First - Single Column) */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 12px 12px;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .left {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: none;
  }
  .product-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: none;
  }
  .product-grid-inner {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .block-heading {
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.75;
    margin-bottom: -4px;
  }
  .product-btn {
    border: none;
    color: white;
    font-weight: 700;
    font-size: 16px;
    padding: 16px 10px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--grey);
  }
  
  /* Category Colors for Buttons */
  #productList[data-tab="tab-bar"] .product-btn { background: var(--orange); }
  #productList[data-tab="tab-bar"] .product-btn:active { background: var(--orange-dark); }
  #productList[data-tab="tab-bier"] .product-btn { background: var(--green); }
  #productList[data-tab="tab-bier"] .product-btn:active { background: var(--green-dark); }
  #productList[data-tab="tab-essen"] .product-btn { background: var(--essen-btn); }
  #productList[data-tab="tab-essen"] .product-btn:active { background: var(--essen-btn-active); }

  .product-sub {
    font-weight: 400;
    font-size: 13px;
    opacity: 0.85;
    display: block;
    margin-top: 4px;
  }
  .empty-hint {
    opacity: 0.6;
    font-size: 14px;
    text-align: center;
    padding: 20px;
    grid-column: 1 / -1;
  }
  .info-box {
    background: var(--card-bg);
    color: #222;
    border-radius: 12px;
    padding: 22px 20px;
  }
  .info-box-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .info-box-text {
    margin: 0 0 10px;
    font-size: 15px;
    line-height: 1.45;
  }
  .info-box-text:last-child { margin-bottom: 0; }
  .info-box-subtitle {
    font-size: 16px;
    font-weight: 800;
    margin: 18px 0 8px;
    color: var(--orange-dark);
  }
  .pfand-btn-main {
    background: var(--red);
    border: none;
    color: white;
    font-weight: 800;
    font-size: 19px;
    padding: 18px;
    border-radius: 12px;
    cursor: pointer;
    display: block;
    width: 100%;
  }
  .pfand-btn-main:active { filter: brightness(0.9); }

  .right {
    display: contents;
  }
  .right h2 {
    display: block;
    margin: 8px 0 0;
    font-size: 18px;
  }
  .cart {
    background: var(--card-bg);
    color: #222;
    border-radius: 12px;
    padding: 6px;
    flex: none;
  }
  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 8px;
    border-bottom: 1px solid #eee;
    font-size: 15px;
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item .ci-name { font-weight: 600; }
  .cart-item .ci-price { white-space: nowrap; margin-left: 8px; font-weight: 600; }
  .cart-item .ci-remove {
    background: none;
    border: none;
    color: #c0392b;
    font-size: 20px;
    padding: 0 4px;
    margin-left: 10px;
    cursor: pointer;
  }
  .cart-pfand-line { font-size: 13px; opacity: 0.65; }

  .neu-btn {
    background: var(--purple);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 16px;
    padding: 16px 14px;
    border-radius: 12px;
    cursor: pointer;
  }
  .total-bar {
    background: var(--orange);
    border-radius: 12px;
    padding: 20px 14px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .total-bar:active { filter: brightness(0.95); }

  .cart-controls {
    display: flex;
    gap: 10px;
    position: sticky;
    bottom: -12px;
    padding: 12px 0;
    background: var(--bg);
    z-index: 10;
  }
  .cart-controls .neu-btn {
    display: block;
    flex: 0 0 auto;
    min-width: 90px;
  }
  .cart-controls .total-bar {
    flex: 1;
    margin-top: 0;
  }

  /* Wechselgeld-Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 25, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .overlay.hidden { display: none; }
  .overlay-card {
    position: relative;
    background: var(--bg-2);
    border-radius: 18px;
    padding: 24px 20px;
    width: 100%;
    max-width: 440px;
    max-height: 95vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .overlay-card h2 {
    margin: 0 0 18px;
    font-size: 22px;
    text-align: center;
  }
  .overlay-row {
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    margin-bottom: 10px;
    padding: 4px 0;
  }
  .overlay-row.total { font-weight: 800; font-size: 20px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px; margin-top: 4px; }
  .overlay-input-wrap {
    margin: 18px 0;
  }
  .overlay-input-wrap label {
    display: block;
    font-size: 15px;
    opacity: 0.8;
    margin-bottom: 8px;
  }
  #receivedInput {
    width: 100%;
    font-size: 32px;
    font-weight: 700;
    padding: 16px;
    border-radius: 12px;
    border: none;
    text-align: center;
    background: white;
    color: #222;
  }
  .quick-amounts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
    gap: 10px;
    margin: 16px 0;
  }
  .quick-amounts button {
    background: var(--grey);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 4px;
    border-radius: 10px;
    cursor: pointer;
  }
  .quick-amounts button:active { filter: brightness(1.3); }
  .change-result {
    text-align: center;
    font-size: 30px;
    font-weight: 800;
    padding: 16px;
    border-radius: 12px;
    margin: 16px 0;
    background: rgba(255,255,255,0.06);
  }
  .change-result.negative { color: #ff8a7a; }
  .change-result.positive { color: #8fe88a; }
  .overlay-buttons {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .overlay-buttons button {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
  }
  .btn-close { background: var(--grey); color: white; }
  .btn-done { background: var(--green); color: #1a1a1a; }
  .overlay-close-x {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 26px;
    line-height: 1;
    padding: 8px 12px;
    cursor: pointer;
  }
  .overlay-close-x:active { color: white; }

  @media (min-width: 700px), (orientation: landscape) {
    .main {
      flex-direction: row;
      overflow-y: hidden;
    }
    .left {
      flex: 1.3;
      overflow-y: auto;
      padding-right: 8px;
      min-height: 0;
    }
    .right {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    .right h2 {
      margin: 0;
      font-size: 17px;
    }
    .cart {
      flex: 1;
      overflow-y: auto;
    }
    .product-grid-inner {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .product-btn {
      font-size: 17px;
      padding: 22px 14px;
      min-height: 76px;
    }
    .cart-controls {
      position: static;
      padding: 0;
      background: transparent;
      flex-direction: column;
    }
    .cart-controls .neu-btn {
      flex: none;
      width: 100%;
    }
    .total-bar {
      min-height: 96px;
    }
  }

  @media (max-width: 360px) {
    .quick-amounts {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>
<div id="app">

  <div class="tabs" id="tabs"></div>

  <div class="pfand-row" id="pfandRow">
    <span id="pfandRowLabel">Pfand berechnen</span>
    <label class="switch">
      <input type="checkbox" id="pfandToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="main">
    <div class="left">
      <div class="product-grid" id="productList"></div>
      <button class="pfand-btn-main" id="pfandMinusBtn">Pfand zurück -2,00 €</button>
    </div>

    <div class="right" id="rightCol">
      <h2>Bestellung</h2>
      <div class="cart" id="cart"></div>
      <div class="cart-controls">
        <button class="neu-btn" id="neuBtn">Leeren</button>
        <div class="total-bar" id="totalBar">Gesamt: 0,00 €</div>
      </div>
    </div>
  </div>

</div>

<div class="overlay hidden" id="changeOverlay">
  <div class="overlay-card">
    <button class="overlay-close-x" id="overlayCloseX">✕</button>
    <h2>Wechselgeld</h2>
    <div class="overlay-row total">
      <span>Zu zahlen</span>
      <span id="overlayTotal">0,00 €</span>
    </div>

    <div class="overlay-input-wrap">
      <label for="receivedInput">Gegeben (€)</label>
      <input type="text" id="receivedInput" inputmode="decimal" autocomplete="off" placeholder="0,00">
    </div>

    <div class="quick-amounts" id="quickAmounts"></div>

    <div class="change-result" id="changeResult">Betrag eingeben…</div>

    <div class="overlay-buttons">
      <button class="btn-done" id="overlayDoneBtn">Fertig</button>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------
// PRODUKTDATEN — hier einfach anpassen / ergänzen
// ---------------------------------------------------------
const PRODUKTE = {
  "Bar": [
    { name: "Glas Sekt/Hugo 0,1l", preis: 2.0, pfand: 2.0 },
    { name: "Schoppen Wein 0,1l", preis: 2.0, pfand: 2.0 },
    { name: "Flasche Wein/Sekt/Hugo", preis: 10.0, pfand: 2.0 },
    { name: "Despo", preis: 4.0, pfand: 2.0 },
    { name: "Mixgetränke", preis: 6.0, pfand: 2.0 },
    { name: "Cocktails", preis: 6.0, pfand: 2.0 },
    { name: "alkfrei Cocktails", preis: 4.0, pfand: 2.0 },
    { name: "Pullchen", preis: 2.5, pfand: 0.0 },
  ],
  "Bier": [
    { name: "Bier/Radler 0,4l", preis: 3.5, pfand: 2.0 },
    { name: "Bier/Radler 0,25l", preis: 2.5, pfand: 2.0 },
    { name: "alkfrei 0,4l", preis: 2.5, pfand: 2.0 },
    { name: "alkfrei 0,25l", preis: 1.5, pfand: 2.0 },
    { name: "alkfrei Flasche", preis: 6.0, pfand: 2.0 },
    { name: "Pullchen", preis: 2.5, pfand: 0.0 },
  ],
  "Essen": {
    "Bratbude": [
      { name: "Bratwurst m Br", preis: 3.5, pfand: 0.0 },
      { name: "Steak m Br", preis: 4.5, pfand: 0.0 },
      { name: "Spieß m Br", preis: 4.5, pfand: 0.0 },
      { name: "Hotdog", preis: 3.0, pfand: 0.0 },
      { name: "Pommes", preis: 2.5, pfand: 0.0 },
      { name: "Fischsemmel", preis: 3.5, pfand: 0.0 },
      { name: "Frühl.rolle 2", preis: 3.5, pfand: 0.0 },
      { name: "Frühl.rolle 3", preis: 5.0, pfand: 0.0 },
    ],
    "Crepe-Bude": [
      { name: "Crepes Puderzucker", preis: 2.5, pfand: 0.0 },
      { name: "Crepes Nutella/Apfelmus", preis: 3.5, pfand: 0.0 },
      { name: "Crepes m. Käse u. Schinken", preis: 4.0, pfand: 0.0 },
      { name: "Waffel Zimt/Zucker", preis: 3.0, pfand: 0.0 },
      { name: "Waffel Nutella/Apfelmus", preis: 4.0, pfand: 0.0 },
      { name: "Waffel m. Käse u. Schinken", preis: 4.5, pfand: 0.0 },
      { name: "Zuckerwatte", preis: 2.0, pfand: 0.0 },
    ],
  },
  // "Info" ist KEINE Produktkategorie, sondern ein Info-/Über-Reiter
  // (entspricht dem "APP Informationen"-Tab der Android-Vorlage).
  // Inhalt wird über INFO_TAB gesteuert, nicht über Produkte.
  "Info": { info: true },
};

// Konfigurierbare Konstanten (vermeiden Hartkodierung an mehreren Stellen)
const PFAND_RUECKGABE_EURO = 2.0;
const ESSEN_TAB = 'Essen';
const ESSEN_BLOCK_STANDARD = 'Bratbude';   // Toggle aus
const ESSEN_BLOCK_TOGGLE = 'Crepe-Bude';   // Toggle an

// Inhalt des Info-Reiters. Überschrift + Inhaltsblöcke.
// Ein Block ist entweder ein String (Absatz) oder { ueberschrift: "…" }.
const INFO_TAB = {
  titel: "Guttauer Dorf- und Teichfest 2026",
  absaetze: [
    "Kassen-App zum schnellen Berechnen der Preise inkl. Pfand und Wechselgeld. Läuft offline – ohne Internet.",
    { ueberschrift: "Bedienung" },
    "Oben die Kategorie wählen (Bar, Bier, Essen). Produkte antippen, um sie der Bestellung hinzuzufügen.",
    "In der Bestellung kann jede Position mit ✕ wieder entfernt werden. „Leeren“ löscht alle Positionen.",
    "Auf die orange Summen-Leiste tippen, um das Wechselgeld zu berechnen.",
    { ueberschrift: "Pfand" },
    "Der Schalter „Pfand berechnen“ legt fest, ob beim Antippen eines Getränks die " +
      formatEuro(PFAND_RUECKGABE_EURO) + " Pfand mit aufgeschlagen werden.",
    "Gibt ein Gast Becher zurück, mit „Pfand zurück -" + formatEuro(PFAND_RUECKGABE_EURO) +
      "“ den Pfand wieder abziehen.",
    { ueberschrift: "Essen" },
    "Im Essen-Tab schaltet der Schalter zwischen „Bratbude“ und „Crepe-Bude“ um. Auf Essen wird kein Pfand berechnet.",
    { ueberschrift: "Wechselgeld" },
    "Den erhaltenen Betrag eingeben oder einen Schnellbetrag wählen – die App zeigt das Rückgeld an. „Fertig“ schließt die Berechnung und leert die Bestellung.",
    "Alle Preise sind in 50-Cent-Schritten – kleinere Münzen als 50 Cent werden nicht benötigt.",
  ],
};

// ---- Geld in Cent rechnen (vermeidet Float-Rundungsfehler) ----
function toCents(value) {
  return Math.round((Number(value) || 0) * 100);
}
// Einheitliche Geldanzeige: deutsches Format mit Komma, 2 Nachkommastellen.
function formatCents(cents) {
  return `${(cents / 100).toFixed(2).replace('.', ',')} €`;
}
function formatEuro(euros) {
  return formatCents(toCents(euros));
}
function getCurrentTotalCents() {
  return cart.reduce(
    (sum, item) => sum + toCents(item.preis) + toCents(item.pfand || 0),
    0
  );
}

const TAB_CLASS = { "Bar": "tab-bar", "Bier": "tab-bier", "Essen": "tab-essen", "Info": "tab-info" };

let currentTab = Object.keys(PRODUKTE)[0];
let cart = []; // { name, preis, pfand, isPfandAbzug }
let pfandBerechnen = true;
let essenZeigeCrepeBude = false; // false = Bratbude, true = Crepe-Bude

const tabsEl = document.getElementById('tabs');
const productListEl = document.getElementById('productList');
const cartEl = document.getElementById('cart');
const totalBarEl = document.getElementById('totalBar');
const pfandToggle = document.getElementById('pfandToggle');
const pfandRowLabel = document.getElementById('pfandRowLabel');

function isEssenTab() {
  return currentTab === ESSEN_TAB && !Array.isArray(PRODUKTE[ESSEN_TAB]);
}

function isInfoTab() {
  const data = PRODUKTE[currentTab];
  return !!(data && !Array.isArray(data) && data.info);
}

function updateToggleForTab() {
  // Auf dem Info-Reiter hat der Toggle keine Funktion → ganze Zeile ausblenden.
  const pfandRow = document.getElementById('pfandRow');
  if (isInfoTab()) {
    pfandRow.style.display = 'none';
    return;
  }
  pfandRow.style.display = '';
  if (isEssenTab()) {
    pfandRowLabel.textContent = 'Crepe-Bude anzeigen';
    pfandToggle.checked = essenZeigeCrepeBude;
  } else {
    pfandRowLabel.textContent = 'Pfand berechnen';
    pfandToggle.checked = pfandBerechnen;
  }
}

function updatePfandButtonVisibility() {
  const pfandBtn = document.getElementById('pfandMinusBtn');
  // Kein Pfand-Button bei Essen und auf dem Info-Reiter.
  pfandBtn.style.display = (isEssenTab() || isInfoTab()) ? 'none' : '';
}

function updateLayoutForTab() {
  // Auf dem Info-Reiter nur die Info-Box zeigen: rechte Spalte
  // (Einkaufswagen, „Neu“, Gesamt) ausblenden, linke Spalte voll nutzen.
  const rightCol = document.getElementById('rightCol');
  const leftCol = document.querySelector('.left');
  if (isInfoTab()) {
    rightCol.style.display = 'none';
    leftCol.style.flex = '1 1 100%';
  } else {
    rightCol.style.display = '';
    leftCol.style.flex = '';
  }
}

function renderTabs() {
  tabsEl.innerHTML = '';
  Object.keys(PRODUKTE).forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn ' + (TAB_CLASS[tab] || '') + (tab === currentTab ? ' active' : '');
    btn.textContent = tab;
    btn.onclick = () => { currentTab = tab; renderTabs(); updateToggleForTab(); renderProducts(); updatePfandButtonVisibility(); updateLayoutForTab(); };
    tabsEl.appendChild(btn);
  });
}

function renderProducts() {
  productListEl.innerHTML = '';
  productListEl.setAttribute('data-tab', TAB_CLASS[currentTab] || '');
  const data = PRODUKTE[currentTab];

  function makeButton(p, showPfand) {
    const btn = document.createElement('button');
    btn.className = 'product-btn';
    btn.appendChild(document.createTextNode(p.name));
    const sub = document.createElement('span');
    sub.className = 'product-sub';
    sub.textContent = (showPfand && p.pfand > 0)
      ? `${formatEuro(p.preis)} + ${formatEuro(p.pfand)} Pfand`
      : `${formatEuro(p.preis)}`;
    btn.appendChild(sub);
    btn.onclick = () => addToCart(p, showPfand);
    return btn;
  }

  if (isInfoTab()) {
    // Info-/Über-Reiter: zeigt eine Info-Box statt Produkten.
    const box = document.createElement('div');
    box.className = 'info-box';
    const h = document.createElement('div');
    h.className = 'info-box-title';
    h.textContent = INFO_TAB.titel;
    box.appendChild(h);
    INFO_TAB.absaetze.forEach(block => {
      if (block && typeof block === 'object' && block.ueberschrift) {
        const sub = document.createElement('div');
        sub.className = 'info-box-subtitle';
        sub.textContent = block.ueberschrift;
        box.appendChild(sub);
      } else {
        const p = document.createElement('p');
        p.className = 'info-box-text';
        p.textContent = block;
        box.appendChild(p);
      }
    });
    productListEl.appendChild(box);
    return;
  }

  if (Array.isArray(data)) {
    if (data.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'Keine Produkte in dieser Kategorie. Im Code (PRODUKTE) ergänzen.';
      productListEl.appendChild(hint);
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'product-grid-inner';
    data.forEach(p => grid.appendChild(makeButton(p, pfandBerechnen)));
    productListEl.appendChild(grid);
  } else if (isEssenTab()) {
    // Essen: Toggle steuert, welcher Block angezeigt wird (kein Pfand bei Essen)
    const blockName = essenZeigeCrepeBude ? ESSEN_BLOCK_TOGGLE : ESSEN_BLOCK_STANDARD;
    const heading = document.createElement('div');
    heading.className = 'block-heading';
    heading.textContent = blockName;
    productListEl.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'product-grid-inner';
    (data[blockName] || []).forEach(p => grid.appendChild(makeButton(p, false)));
    productListEl.appendChild(grid);
  } else {
    // Generischer Fall: Objekt mit Unterblöcken, alle gleichzeitig anzeigen
    Object.keys(data).forEach(blockName => {
      const heading = document.createElement('div');
      heading.className = 'block-heading';
      heading.textContent = blockName;
      productListEl.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'product-grid-inner';
      data[blockName].forEach(p => grid.appendChild(makeButton(p, pfandBerechnen)));
      productListEl.appendChild(grid);
    });
  }
}

function addToCart(p, includePfand = pfandBerechnen) {
  cart.push({ name: p.name, preis: p.preis, pfand: includePfand ? p.pfand : 0 });
  renderCart();
}

function addPfandAbzug() {
  cart.push({ name: "Pfand-Rückgabe", preis: -PFAND_RUECKGABE_EURO, pfand: 0, isPfandAbzug: true });
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

function renderCart() {
  cartEl.innerHTML = '';
  cart.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'cart-item';

    const left = document.createElement('div');
    const name = document.createElement('div');
    name.className = 'ci-name';
    name.textContent = item.name;
    left.appendChild(name);
    if (item.pfand > 0) {
      const pf = document.createElement('div');
      pf.className = 'cart-pfand-line';
      pf.textContent = `inkl. ${formatEuro(item.pfand)} Pfand`;
      left.appendChild(pf);
    }

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    const price = document.createElement('span');
    price.className = 'ci-price';
    price.textContent = formatCents(toCents(item.preis) + toCents(item.pfand || 0));
    const rm = document.createElement('button');
    rm.className = 'ci-remove';
    rm.setAttribute('aria-label', 'Entfernen');
    rm.textContent = '✕';
    rm.onclick = () => removeItem(idx);
    right.appendChild(price);
    right.appendChild(rm);

    row.appendChild(left);
    row.appendChild(right);
    cartEl.appendChild(row);
  });
  updateTotal();
}

function updateTotal() {
  totalBarEl.textContent = `Gesamt: ${formatCents(getCurrentTotalCents())}`;
}

// ---- Wechselgeld-Overlay ----
const changeOverlay = document.getElementById('changeOverlay');
const overlayTotalEl = document.getElementById('overlayTotal');
const receivedInput = document.getElementById('receivedInput');
const changeResultEl = document.getElementById('changeResult');
const quickAmountsEl = document.getElementById('quickAmounts');

function openChangeOverlay() {
  const totalCents = getCurrentTotalCents();
  if (totalCents <= 0) return; // Kein Wechselgeld bei Betrag 0 oder Auszahlung

  overlayTotalEl.textContent = formatCents(totalCents);
  receivedInput.value = '';
  changeResultEl.textContent = 'Betrag eingeben…';
  changeResultEl.className = 'change-result';

  // Realistische "Erhalten"-Vorschläge auf Basis echter deutscher
  // Münz-/Scheinwerte (ab 0,50 €). Idee: Was könnte der Gast gegeben haben?
  // -> der exakte Betrag, plus Aufrundung auf das nächste Vielfache jeder
  //    Stückelung (0,50/1/2/5/10/20 €) und jede Stückelung selbst, sofern
  //    sie >= Gesamtbetrag ist. So entstehen v.a. bei kleinen Beträgen
  //    sinnvolle Vorschläge (z.B. 3,50 € -> 4 €, 5 €).
  const DENOMS = [50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000]; // Cent
  const ceilTo = (cents, step) => Math.ceil(cents / step) * step;

  const candidateSet = new Set();
  candidateSet.add(totalCents); // exakt passend
  DENOMS.forEach(d => {
    candidateSet.add(ceilTo(totalCents, d)); // auf nächstes Vielfaches aufrunden
    if (d >= totalCents) candidateSet.add(d); // einzelne Münze/Schein, die reicht
  });

  const finalAmounts = [...candidateSet]
    .filter(c => c >= totalCents && c > 0)
    .sort((a, b) => a - b)
    .slice(0, 8); // die kleinsten (= wahrscheinlichsten) Vorschläge zuerst

  quickAmountsEl.innerHTML = '';
  finalAmounts.forEach(cents => {
    const b = document.createElement('button');
    b.textContent = formatCents(cents);
    b.onclick = () => { receivedInput.value = (cents / 100).toFixed(2).replace('.', ','); calcChange(); };
    quickAmountsEl.appendChild(b);
  });

  changeOverlay.classList.remove('hidden');
  setTimeout(() => receivedInput.focus(), 100);
}

function closeChangeOverlay() {
  changeOverlay.classList.add('hidden');
}

function parseEuroCents(value) {
  const raw = value.trim().replace(',', '.');
  if (raw === '') return null;
  const amount = Number(raw);
  if (!Number.isFinite(amount) || amount < 0) return null;
  return Math.round(amount * 100);
}

function calcChange() {
  const totalCents = getCurrentTotalCents();
  const receivedCents = parseEuroCents(receivedInput.value);
  if (receivedCents === null) {
    changeResultEl.textContent = 'Betrag eingeben…';
    changeResultEl.className = 'change-result';
    return;
  }
  const changeCents = receivedCents - totalCents;
  if (changeCents < 0) {
    changeResultEl.textContent = `Fehlt: ${formatCents(Math.abs(changeCents))}`;
    changeResultEl.className = 'change-result negative';
  } else {
    changeResultEl.textContent = `Rückgeld: ${formatCents(changeCents)}`;
    changeResultEl.className = 'change-result positive';
  }
}

totalBarEl.onclick = openChangeOverlay;
receivedInput.addEventListener('input', calcChange);
document.getElementById('overlayCloseX').onclick = closeChangeOverlay;
document.getElementById('overlayDoneBtn').onclick = () => {
  closeChangeOverlay();
  resetCart();
};
changeOverlay.addEventListener('click', (e) => {
  if (e.target === changeOverlay) closeChangeOverlay();
});

function resetCart() {
  cart = [];
  renderCart();
}

const pfandMinusBtn = document.getElementById('pfandMinusBtn');
pfandMinusBtn.textContent = `Pfand zurück -${formatEuro(PFAND_RUECKGABE_EURO)}`;
pfandMinusBtn.onclick = addPfandAbzug;
document.getElementById('neuBtn').onclick = () => {
  if (cart.length === 0 || confirm('Bestellung wirklich leeren?')) resetCart();
};
pfandToggle.onchange = () => {
  if (isEssenTab()) {
    essenZeigeCrepeBude = pfandToggle.checked;
  } else {
    pfandBerechnen = pfandToggle.checked;
  }
  renderProducts();
};

renderTabs();
updateToggleForTab();
updatePfandButtonVisibility();
updateLayoutForTab();
renderProducts();
renderCart();

// Service Worker für Offline-Nutzung registrieren
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
